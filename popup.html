<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 14px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: #24292f;
        }
        
        .header p {
            margin: 4px 0 0 0;
            color: #656d76;
            font-size: 12px;
        }
        
        .section {
            margin-bottom: 16px;
        }
        
        .section h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: #24292f;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 8px;
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            color: #24292f;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn:hover {
            background-color: #f3f4f6;
            border-color: #afb8c1;
        }
        
        .btn-primary {
            background-color: #2da44e;
            border-color: #2da44e;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #2c974b;
            border-color: #2c974b;
        }
        
        .status {
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .status.success {
            background-color: #dafbe1;
            color: #1a7f37;
            border: 1px solid #a2eca5;
        }
        
        .status.error {
            background-color: #ffebe9;
            color: #cf222e;
            border: 1px solid #ff818266;
        }
        
        .draft-count {
            background-color: #0969da;
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .links {
            border-top: 1px solid #d0d7de;
            padding-top: 12px;
            text-align: center;
        }
        
        .links a {
            color: #0969da;
            text-decoration: none;
            font-size: 12px;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>GitHub Draft Issues</h1>
        <p>Manage your draft issues</p>
    </div>
    
    <div id="status"></div>
    
    <div class="section">
        <h3>Current Repository</h3>
        <div id="repo-info">
            <p id="repo-name">Not on a GitHub repository</p>
            <p id="draft-count">Loading...</p>
        </div>
    </div>
    
    <div class="section">
        <h3>Quick Actions</h3>
        <button class="btn btn-primary" id="create-draft">Create New Draft</button>
        <button class="btn" id="view-drafts">View All Drafts</button>
    </div>
    
    <div class="section">
        <h3>Data Management</h3>
        <button class="btn" id="export-drafts">Export Drafts</button>
        <button class="btn" id="import-drafts">Import Drafts</button>
        <input type="file" id="import-file" accept=".json" style="display: none;">
    </div>
    
    <div class="links">
        <a href="https://github.com/jzheaux/draft" target="_blank">View on GitHub</a>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
